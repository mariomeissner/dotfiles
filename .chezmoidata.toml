# Static defaults available to templates. Override per-machine in
# ~/.config/chezmoi/chezmoi.toml under [data].

# yt-to-gobby is opt-in and off by default. It uploads YouTube transcripts to a
# personal VPS over SSH, so it should only be enabled on personal machines. To
# enable it, set enableYtToGobby = true in this machine's local chezmoi config.
enableYtToGobby = false

# Karabiner-Elements config that remaps a JIS physical keyboard to ANSI-style
# symbols (the profile sets the virtual keyboard type to "ansi"). Only useful
# on machines with a JIS keyboard, so it is opt-in. To enable it, set
# enableKarabiner = true in this machine's local chezmoi config.
enableKarabiner = false

# Default cwd for new Herdr panes/tabs. Override per-machine in local chezmoi
# config, e.g. herdrDefaultCwd = "~/Projects/myorg".
herdrDefaultCwd = "~/Projects"
